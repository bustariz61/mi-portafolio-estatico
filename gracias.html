<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>¡Mensaje enviado! · Brayan Ustariz</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        .gracias-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #1e293b 100%);
            position: relative;
            overflow: hidden;
        }

        .gracias-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59,130,246,0.25) 0%, transparent 60%);
            pointer-events: none;
        }

        .gracias-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2rem;
            padding: 3.5rem 3rem;
            text-align: center;
            max-width: 540px;
            width: 100%;
            position: relative;
            z-index: 1;
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.5);
        }

        .check-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.75rem;
            font-size: 2.5rem;
            color: #fff;
            box-shadow: 0 0 0 12px rgba(34,197,94,0.15);
            animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        @keyframes pop-in {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .gracias-card h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #f1f5f9;
            margin-bottom: 1rem;
        }

        .gracias-card p {
            color: #94a3b8;
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .countdown-text {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 1rem;
        }

        .countdown-text span {
            color: #60a5fa;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="gracias-section">
        <div class="gracias-card">

            <div class="check-circle">
                <i class="fas fa-check"></i>
            </div>

            <h1>¡Mensaje enviado!</h1>

            <p>
                Gracias por contactarme. He recibido tu mensaje y te responderé
                en <strong style="color:#60a5fa;">menos de 24 horas</strong>.<br>
                ¡Espera noticias pronto! 🚀
            </p>

            <a href="index.html" class="btn btn-primary btn-lg px-5 btn-glow">
                <i class="fas fa-arrow-left me-2"></i>Volver al portafolio
            </a>

            <p class="countdown-text">
                Redirigiendo en <span id="countdown">5</span> segundos...
            </p>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Fade-in
        document.body.style.opacity = '0';
        document.body.style.transition = 'opacity 0.4s';
        window.addEventListener('load', () => { document.body.style.opacity = '1'; });

        // Cuenta regresiva y redirección
        let seconds = 5;
        const countEl = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds--;
            if (countEl) countEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>
